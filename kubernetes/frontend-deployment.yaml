# =====================================================
# Netflix Clone - Frontend Deployment
# =====================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: netflix-frontend
  namespace: netflix-clone
  labels:
    app: netflix-frontend
    tier: frontend
    version: "1.0"
spec:
  replicas: 2
  selector:
    matchLabels:
      app: netflix-frontend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: netflix-frontend
        tier: frontend
    spec:
      containers:
        - name: netflix-frontend
          image: YOUR_DOCKERHUB_USERNAME/netflix-frontend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 80
              protocol: TCP
          env:
            - name: REACT_APP_API_URL
              value: "http://netflix-backend-service:5000"
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "100m"
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 20
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
      restartPolicy: Always
      terminationGracePeriodSeconds: 30
