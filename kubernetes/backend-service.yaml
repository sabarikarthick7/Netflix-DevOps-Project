# =====================================================
# Netflix Clone - Backend Service
# =====================================================
apiVersion: v1
kind: Service
metadata:
  name: netflix-backend-service
  namespace: netflix-clone
  labels:
    app: netflix-backend
    tier: backend
spec:
  type: ClusterIP
  selector:
    app: netflix-backend
  ports:
    - name: http
      protocol: TCP
      port: 5000
      targetPort: 5000
