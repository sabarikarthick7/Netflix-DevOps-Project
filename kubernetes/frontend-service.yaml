# =====================================================
# Netflix Clone - Frontend Service
# Type: NodePort for external access
# =====================================================
apiVersion: v1
kind: Service
metadata:
  name: netflix-frontend-service
  namespace: netflix-clone
  labels:
    app: netflix-frontend
    tier: frontend
spec:
  type: NodePort
  selector:
    app: netflix-frontend
  ports:
    - name: http
      protocol: TCP
      port: 80
      targetPort: 80
      nodePort: 30000   # Access via http://<NODE-IP>:30000
